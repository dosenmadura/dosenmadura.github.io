<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kumpulan Jurnal FPDM</title>

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="header">

<h1>📚 Kumpulan Jurnal FPDM</h1>

<p>Forum Profesi Dosen Madura</p>

</header>

<main>

type="text"
id="search"
placeholder="Cari nama jurnal..."
>

<div class="filter">

<button>Semua</button>
<button>S1</button>
<button>S2</button>
<button>S3</button>
<button>S4</button>

        <img src="https://res.cloudinary.com/arsaydwv/image/upload/v1784057181/kabilah_cover_pmw9hi.jpg" alt="Cover">

        <div class="card-body">

            <h3>Jurnal Kabilah</h3>

            <p class="kampus">
                IAI NATA Sampang
            </p>

            <span class="badge">
                SINTA 5
            </span>

            <a href="https://ejournal.iainata.ac.id/kabilah" class="btn">
                🌐 Kunjungi Jurnal

        </div>

    </div>

</main>

<script src="assets/js/script.js"></script>
